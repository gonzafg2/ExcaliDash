services:
  db:
    image: postgres:17-alpine
    container_name: excalidash-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-excalidash}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-excalidash}
      - POSTGRES_DB=${POSTGRES_DB:-excalidash}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - excalidash-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-excalidash}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: excalidash-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-excalidash}:${POSTGRES_PASSWORD:-excalidash}@db:5432/${POSTGRES_DB:-excalidash}?connection_limit=10
      - PORT=8000
      - NODE_ENV=production
      - UPDATE_CHECK_OUTBOUND=false
      - AUTH_MODE=${AUTH_MODE:-local}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - JWT_SECRET=${JWT_SECRET}
      - CSRF_SECRET=${CSRF_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:${FRONTEND_PORT:-6767}}
      # Optional OIDC settings (required for AUTH_MODE=hybrid or oidc_enforced)
      # - OIDC_PROVIDER_NAME=Authentik
      # - OIDC_ISSUER_URL=https://auth.example.com/application/o/excalidash/
      # - OIDC_CLIENT_ID=your-client-id
      # - OIDC_CLIENT_SECRET=your-client-secret
      # - OIDC_REDIRECT_URI=https://excalidash.example.com/api/auth/oidc/callback
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - excalidash-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get({hostname:'localhost',port:8000,path:'/health',headers:{'x-forwarded-proto':'https'}}, (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: excalidash-frontend
    ports:
      - "${FRONTEND_PORT:-6767}:80"
    environment:
      - BACKEND_URL=backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - excalidash-network
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  excalidash-network:
    driver: bridge

volumes:
  pgdata:
  uploads:
