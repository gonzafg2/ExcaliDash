services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: excalidash-backend
    environment:
      DATABASE_URL: file:/app/prisma/dev.db
      PORT: 8000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:16767
      AUTH_MODE: ${AUTH_MODE:-hybrid}
      TRUST_PROXY: "true"
      OIDC_PROVIDER_NAME: Keycloak
      OIDC_ISSUER_URL: http://oidc.localtest.me:8081/realms/excalidash
      OIDC_CLIENT_ID: excalidash-local
      OIDC_CLIENT_SECRET: excalidash-local-secret
      OIDC_REDIRECT_URI: http://localhost:16767/api/auth/oidc/callback
      OIDC_SCOPES: openid profile email
      OIDC_EMAIL_CLAIM: email
      OIDC_EMAIL_VERIFIED_CLAIM: email_verified
      OIDC_REQUIRE_EMAIL_VERIFIED: "false"
      OIDC_JIT_PROVISIONING: "true"
      OIDC_FIRST_USER_ADMIN: "true"
    volumes:
      - backend-data:/app/prisma
    networks:
      - excalidash-network
    restart: unless-stopped
    extra_hosts:
      - "oidc.localtest.me:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: excalidash-frontend
    ports:
      - "16767:80"
    environment:
      BACKEND_URL: backend:8000
    depends_on:
      - backend
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: excalidash-keycloak
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: oidc.localtest.me
      KC_HOSTNAME_PORT: "8081"
    ports:
      - "8081:8080"
    volumes:
      - ./ops/keycloak/realm-excalidash-local.json:/opt/keycloak/data/import/realm-excalidash-local.json:ro
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /realms/excalidash/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '\"issuer\"' <&3",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

networks:
  excalidash-network:
    driver: bridge

volumes:
  backend-data:
